name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

jobs:
  build-and-release:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build .app bundle
        run: make

      - name: Build styled DMG
        run: make dmg

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Locate DMG
        id: dmg
        run: |
          path=$(ls build/SleepBlocker-*.dmg | head -1)
          echo "path=$path" >> $GITHUB_OUTPUT
          echo "Found DMG at $path"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" "${{ steps.dmg.outputs.path }}" \
            --title "SleepBlocker ${{ steps.tag.outputs.tag }}" \
            --generate-notes
